<!DOCTYPE html>
<html lang="am" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ምርጥ የአፖች ስብስብ | ይመዝገቡ</title>
    
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@100..900&display=swap');
        body { font-family: 'Noto Sans Ethiopic', sans-serif; }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .gradient-text {
            background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        #timer-circle {
            transition: stroke-dashoffset 1s linear;
        }
        .btn-clicked {
            transform: scale(0.97);
        }
    </style>
</head>
<body class="bg-[#050b18] text-white min-h-screen flex flex-col items-center justify-center p-6 overflow-hidden">

    <div class="max-w-xl w-full text-center space-y-8">
        <!-- Main Title -->
        <div class="space-y-4">
            <h1 class="text-4xl md:text-5xl font-black leading-tight">
                ከ500 በላይ <span class="gradient-text">ድንቅ አፖች</span>
            </h1>
            <p class="text-gray-400">የትም የማይገኙ ምርጥ አፕሊኬሽኖችን ለማግኘት ተዘጋጅተዋል?</p>
        </div>

        <!-- Features List -->
        <div class="grid grid-cols-2 gap-4 py-2">
            <div class="glass p-4 rounded-2xl flex items-center space-x-4 rtl:space-x-reverse">
                <div class="bg-blue-500/20 p-3 rounded-xl"><i class="fas fa-magic text-blue-400"></i></div>
                <span class="text-sm font-medium">የስልክ ማሳመሪያ</span>
            </div>
            <div class="glass p-4 rounded-2xl flex items-center space-x-4 rtl:space-x-reverse">
                <div class="bg-purple-500/20 p-3 rounded-xl"><i class="fas fa-film text-purple-400"></i></div>
                <span class="text-sm font-medium">የፊልም ማውረጃ</span>
            </div>
            <div class="glass p-4 rounded-2xl flex items-center space-x-4 rtl:space-x-reverse">
                <div class="bg-green-500/20 p-3 rounded-xl"><i class="fas fa-trash-restore text-green-400"></i></div>
                <span class="text-sm font-medium">የጠፋ ፋይል ማግኛ</span>
            </div>
            <div class="glass p-4 rounded-2xl flex items-center space-x-4 rtl:space-x-reverse">
                <div class="bg-red-500/20 p-3 rounded-xl"><i class="fas fa-wifi text-red-400"></i></div>
                <span class="text-sm font-medium">የዋይፋይ ፓስወርድ</span>
            </div>
        </div>

        <!-- SMS Verification Box -->
        <div class="glass p-8 rounded-[2.5rem] shadow-2xl relative">
            <h2 class="text-xl font-bold mb-6">ሊንኩን ለማግኘት ይመዝገቡ</h2>
            
            <!-- Countdown Timer -->
            <div class="relative flex items-center justify-center mb-8">
                <svg class="w-24 h-24 transform -rotate-90">
                    <circle class="text-gray-800" stroke-width="6" stroke="currentColor" fill="transparent" r="45" cx="48" cy="48" />
                    <circle class="text-blue-500" stroke-width="6" stroke-dasharray="283" stroke-dashoffset="0" stroke-linecap="round" stroke="currentColor" fill="transparent" r="45" cx="48" cy="48" id="timer-circle" />
                </svg>
                <span id="countdown" class="absolute text-3xl font-black italic">5</span>
            </div>

            <!-- SMS Button -->
            <button id="smsButton" class="w-full py-4 bg-green-600 hover:bg-green-500 text-white rounded-2xl font-bold text-lg transition-all transform active:scale-95 shadow-xl shadow-green-900/20 mb-4">
                <i class="fas fa-sms mr-2"></i> አሁኑኑ ይመዝገቡ
            </button>
            
            <p class="text-[12px] text-gray-400" id="instructionText">
                ቁልፉን ሲጫኑ ወደ SMS አፕ ይወስዳል
            </p>
        </div>

        <!-- Footer -->
        <div class="flex justify-center items-center space-x-4 text-xs text-gray-500 tracking-widest uppercase">
            <span>አስተማማኝ</span>
            <div class="w-1 h-1 bg-gray-700 rounded-full"></div>
            <span>ፈጣን</span>
            <div class="w-1 h-1 bg-gray-700 rounded-full"></div>
            <span>ነፃ</span>
        </div>
    </div>

    <script>
        // Configuration
        const REDIRECT_PAGE_URL = "https://addismobileapps.vercel.app/sms-redirect.html";
        
        let timeLeft = 5;
        let countdownActive = true;
        let smsButton = document.getElementById('smsButton');
        let countdownElement = document.getElementById('countdown');
        let circle = document.getElementById('timer-circle');
        let totalDash = 283;
        let timer;

        // Initialize Telegram WebApp
        let tg = window.Telegram.WebApp;
        tg.expand(); // Expand to full screen
        tg.enableClosingConfirmation(); // Ask before closing

        // Start countdown
        function startCountdown() {
            timer = setInterval(() => {
                if (timeLeft <= 1) {
                    clearInterval(timer);
                    countdownActive = false;
                    countdownElement.textContent = "GO!";
                    // Change button appearance when ready
                    smsButton.classList.add('bg-green-500', 'animate-pulse');
                    document.getElementById('instructionText').innerHTML = '✅ አሁን ቁልፉን መጫን ይችላሉ!';
                } else {
                    timeLeft--;
                    countdownElement.textContent = timeLeft;
                    const offset = totalDash - (timeLeft / 5) * totalDash;
                    circle.style.strokeDashoffset = offset;
                }
            }, 1000);
        }

        // Main function to open SMS via redirect page
        function openSMSWithRedirect() {
            if (window.Telegram && window.Telegram.WebApp) {
                // Open the redirect page in external browser
                // The external browser will handle the sms: protocol
                window.Telegram.WebApp.openLink(REDIRECT_PAGE_URL, { try_browser: true });
                
                // Optional: Close the mini app after opening
                setTimeout(() => {
                    window.Telegram.WebApp.close();
                }, 500);
            } else {
                // Fallback for regular browsers
                window.location.href = "sms:6975?body=OK";
            }
        }

        // Handle button click with countdown protection
        smsButton.addEventListener('click', function(e) {
            e.preventDefault();
            
            if (countdownActive) {
                // Show warning if countdown not finished
                tg.showAlert("እባክዎ ቆጠራው እስኪያልቅ ይጠብቁ!");
                return;
            }
            
            // Open SMS
            openSMSWithRedirect();
        });

        // Start everything
        startCountdown();
        
        // Show welcome message
        tg.showPopup({
            title: "እንኳን ደህና መጡ!",
            message: "አፕሊኬሽኖቹን ለማግኘት በ SMS መመዝገብ ይጠበቅብዎታል",
            buttons: [{ type: "ok" }]
        });
    </script>
</body>
</html>
